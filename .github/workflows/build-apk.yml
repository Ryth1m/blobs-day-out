name: Build Android APK

on:
  push:
    branches: [main]
  # Optionally allow manual trigger
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04   # Stable Ubuntu version

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip build-essential git \
            libffi-dev libssl-dev zlib1g-dev liblzma-dev \
            openjdk-17-jdk unzip autoconf libtool pkg-config cmake \
            wget
          pip install buildozer cython virtualenv

      - name: Set up Android SDK
        run: |
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $ANDROID_SDK_ROOT
          cd /tmp
          # Download the latest command-line tools (check for latest version if needed)
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          mv cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          # Set environment variables for subsequent steps
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          # Accept licenses (silently) and install required components
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "build-tools;33.0.2" "platforms;android-33"
          # Verify SDK installation
          echo "SDK installed successfully"

      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = A Blob's Day Out
          package.name = ablobsdayout
          package.domain = org.blobgame
          source.dir = .
          source.include_exts = py
          version = 1.0
          requirements = python3,kivy==2.3.0,pygame
          orientation = landscape
          fullscreen = 1
          android.api = 33
          android.minapi = 21
          android.archs = arm64-v8a
          android.accept_sdk_license = True
          android.sdk_path = /home/runner/.buildozer/android/platform/android-sdk
          [buildozer]
          log_level = 2
          EOF

      - name: Build APK with Buildozer
        run: |
          # Ensure environment variables are available
          export ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT
          export ANDROID_HOME=$ANDROID_HOME
          # Run buildozer, capture logs
          yes | buildozer android debug 2>&1 | tee build.log
        continue-on-error: true   # We'll upload logs even if it fails

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log

      - name: Upload APK (if successful)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blobs-day-out-apk
          path: bin/*.apk
          if-no-files-found: warn
