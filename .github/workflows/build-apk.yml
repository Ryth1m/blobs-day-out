name: Build Android APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Buildozer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip build-essential git \
            libffi-dev libssl-dev zlib1g-dev liblzma-dev \
            openjdk-17-jdk unzip autoconf libtool pkg-config \
            cmake libltdl-dev
          pip install buildozer cython virtualenv

      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = A Blob's Day Out
          package.name = ablobsdayout
          package.domain = org.blobgame
          source.dir = .
          source.include_exts = py
          version = 1.0
          requirements = python3,kivy==2.3.0,pygame
          orientation = landscape
          fullscreen = 1
          android.api = 33
          android.minapi = 21
          android.archs = arm64-v8a
          [buildozer]
          log_level = 2
          EOF

      - name: Build APK
        run: |
          buildozer android debug 2>&1 | tee build.log
          echo "Exit code: $?"
        continue-on-error: true

      - name: Show build log tail
        run: tail -100 build.log
        if: always()

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log

      - name: Upload APK if exists
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blobs-day-out-apk
          path: bin/*.apk
          if-no-files-found: warn
