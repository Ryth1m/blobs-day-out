name: Build Android APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04  # More stable than ubuntu-latest (24.04)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip build-essential git \
            libffi-dev libssl-dev zlib1g-dev liblzma-dev \
            openjdk-17-jdk unzip autoconf libtool pkg-config cmake
          pip install buildozer cython virtualenv

      - name: Set up Android SDK with correct paths
        run: |
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $ANDROID_SDK_ROOT/tools/bin
          mkdir -p $HOME/.android

          # Download cmdline-tools (older stable version)
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-6514223_latest.zip
          unzip -q commandlinetools-linux-6514223_latest.zip

          # Put sdkmanager where buildozer expects it (tools/bin/)
          cp -r tools/* $ANDROID_SDK_ROOT/tools/
          chmod +x $ANDROID_SDK_ROOT/tools/bin/sdkmanager

          # Accept all licenses
          echo "count=0" > $HOME/.android/repositories.cfg
          yes | $ANDROID_SDK_ROOT/tools/bin/sdkmanager \
            --sdk_root=$ANDROID_SDK_ROOT \
            --licenses > /dev/null 2>&1 || true

          # Install required SDK components
          yes | $ANDROID_SDK_ROOT/tools/bin/sdkmanager \
            --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "build-tools;33.0.2" \
            "platforms;android-33" || true

          echo "SDK setup complete"
          ls $ANDROID_SDK_ROOT/

      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = A Blob's Day Out
          package.name = ablobsdayout
          package.domain = org.blobgame
          source.dir = .
          source.include_exts = py
          version = 1.0
          # START: IMPORTANT – pygame often fails on Android
          # To use pygame, uncomment next line and also add SDL2 libs (see commented section below).
          # requirements = python3,kivy==2.3.0,pygame,sdl2,sdl2_image,sdl2_mixer,sdl2_ttf
          # For a stable build, use only Kivy (assuming your game uses Kivy's canvas)
          requirements = python3,kivy==2.3.0
          orientation = landscape
          fullscreen = 1
          android.api = 33
          android.minapi = 21
          android.archs = arm64-v8a
          android.accept_sdk_license = True
          android.sdk_path = /home/runner/.buildozer/android/platform/android-sdk
          # If you add pygame, also add these lines:
          # android.add_sdk = sdl2, sdl2_image, sdl2_mixer, sdl2_ttf
          [buildozer]
          log_level = 2
          EOF

      - name: Build APK
        run: |
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          yes | buildozer android debug 2>&1 | tee build.log
        continue-on-error: true

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blobs-day-out-apk
          path: bin/*.apk
          if-no-files-found: warn
